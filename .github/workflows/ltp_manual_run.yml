name: LTP Tracker

on:
  schedule:
    # IST times converted to UTC (IST = UTC+5:30)
    - cron: '30 3 * * 1-5'   # 9:00 AM IST (Mon-Fri)
    - cron: '30 4 * * 1-5'   # 10:00 AM IST (Mon-Fri)
    - cron: '30 7 * * 1-5'   # 1:00 PM IST (Mon-Fri)
    - cron: '30 8 * * 1-5'   # 2:00 PM IST (Mon-Fri)
    - cron: '30 9 * * 1-5'   # 3:00 PM IST (Mon-Fri)
    - cron: '0 10 * * 1-5'   # 3:30 PM IST (Mon-Fri)
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Run mode"
        required: true
        default: "run"
        type: choice
        options:
          - run
      max_symbols:
        description: "Optional: limit symbols for quick test (0 = all)"
        required: false
        default: "0"
        type: string

jobs:
  ltp-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests mthrottle gspread google-auth

      - name: Run LTP tracker
        env:
          PYTHONUNBUFFERED: "1"
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          LTP_MAX_SYMBOLS: ${{ github.event.inputs.max_symbols || '0' }}
          NSE_TIMEOUT_SECONDS: "12"
        run: |
          python ltp_tracker.py ${{ github.event.inputs.run_mode || 'run' }}

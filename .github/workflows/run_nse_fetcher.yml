name: NSE Data Fetcher Cron

on:
  schedule:
    # Run at 10:00 UTC (3:30 PM IST) every weekday (Monday-Friday)
    - cron: '0 10 * * 1-5'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-fetcher:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # NSE API and Google Sheets dependencies
          pip install requests httpx mthrottle gspread google-auth

      - name: Run NSE Fetcher
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python test.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ONE_BY_ONE_FETCH_Export.csv
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update NSE data [$(date +'%Y-%m-%d')]" && git push)

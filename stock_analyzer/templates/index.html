<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTM Options Scanner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="container">
        <h1>OTM Options Scanner</h1>

        <div class="controls">
            <div class="input-group">
                <label for="fromDate">From Date:</label>
                <input type="date" id="fromDate" value="2026-01-01">
            </div>

            <div class="input-group">
                <label for="toDate">To Date:</label>
                <input type="date" id="toDate" value="2026-03-30">
            </div>

            <div class="input-group">
                <label for="expiryDate">Expiry Date:</label>
                <input type="date" id="expiryDate" value="2026-03-30">
            </div>

            <button id="startScanBtn" onclick="startScan()">Start Scan</button>
        </div>

        <div id="progressSection" class="hidden">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <p id="progressText">Initializing scan...</p>
        </div>

        <div id="resultsSection" class="hidden">
            <h2>Scan Results</h2>
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>Symbol</th>
                        <th>Strike Price</th>
                        <th>Type</th>
                        <th>Initial OI</th>
                        <th>Final OI</th>
                        <th>Total Growth</th>
                        <th>% Growth</th>
                        <th>Consistency Score</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                </tbody>
            </table>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>

</html>
